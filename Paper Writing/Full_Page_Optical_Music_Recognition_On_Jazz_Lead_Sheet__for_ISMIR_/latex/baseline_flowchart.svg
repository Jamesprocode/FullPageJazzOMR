<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="886" height="124" viewBox="0 0 886 124" font-family="Helvetica, Arial, sans-serif">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#222"/></marker></defs>
<rect x="20" y="32" width="90" height="56" rx="5" fill="#ffffff" stroke="#222" stroke-width="1.1"/>
<text x="65" y="58" text-anchor="middle" font-size="11" fill="#222">Full-page</text>
<text x="65" y="72" text-anchor="middle" font-size="11" fill="#222">lead sheet</text>
<rect x="198" y="32" width="100" height="56" rx="5" fill="#EEF2F7" stroke="#222" stroke-width="1.1"/>
<text x="247" y="58" text-anchor="middle" font-size="11" fill="#222">System detect</text>
<text x="247" y="72" text-anchor="middle" font-size="11" fill="#222">(YOLO)</text>
<rect x="388" y="32" width="110" height="56" rx="5" fill="#CFE2F3" stroke="#222" stroke-width="1.1"/>
<text x="443" y="58" text-anchor="middle" font-size="11" fill="#222">Staff-level</text>
<text x="443" y="72" text-anchor="middle" font-size="11" fill="#222">inference (SMT)</text>
<rect x="578" y="32" width="110" height="56" rx="5" fill="#EEF2F7" stroke="#222" stroke-width="1.1"/>
<text x="633" y="58" text-anchor="middle" font-size="11" fill="#222">Page-level</text>
<text x="633" y="72" text-anchor="middle" font-size="11" fill="#222">score assembly</text>
<rect x="760" y="32" width="85" height="56" rx="5" fill="#ffffff" stroke="#222" stroke-width="1.1"/>
<text x="803" y="58" text-anchor="middle" font-size="11" fill="#222">Evaluation</text>
<text x="803" y="72" text-anchor="middle" font-size="11" fill="#222">(full page)</text>
<line x1="115" y1="60" x2="194" y2="60" stroke="#222" stroke-width="1.1" marker-end="url(#arrow)"/>
<text x="153" y="43" text-anchor="middle" font-size="10" font-style="italic" fill="#444">pre-processing</text>
<text x="153" y="54" text-anchor="middle" font-size="10" font-style="italic" fill="#444">(rotate, resize)</text>
<line x1="305" y1="60" x2="384" y2="60" stroke="#222" stroke-width="1.1" marker-end="url(#arrow)"/>
<text x="342" y="43" text-anchor="middle" font-size="10" font-style="italic" fill="#444">post-processing</text>
<text x="342" y="54" text-anchor="middle" font-size="10" font-style="italic" fill="#444">(crop, order)</text>
<line x1="502" y1="60" x2="574" y2="60" stroke="#222" stroke-width="1.1" marker-end="url(#arrow)"/>
<text x="538" y="43" text-anchor="middle" font-size="10" font-style="italic" fill="#444">concatenate</text>
<text x="538" y="54" text-anchor="middle" font-size="10" font-style="italic" fill="#444">predictions</text>
<line x1="692" y1="60" x2="755" y2="60" stroke="#222" stroke-width="1.1" marker-end="url(#arrow)"/>
<text x="722" y="50" text-anchor="middle" font-size="10" font-style="italic" fill="#444">evaluate</text>
<g transform="translate(333,106)" font-size="10" fill="#333">
<rect x="0"   y="0" width="14" height="10" fill="#ffffff" stroke="#222"/><text x="20"  y="9">data</text>
<rect x="60"  y="0" width="14" height="10" fill="#EEF2F7" stroke="#222"/><text x="80"  y="9">process</text>
