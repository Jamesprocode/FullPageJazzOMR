<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="520" height="620" viewBox="0 0 520 620" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
  </defs>
  <rect x="60" y="20" width="240" height="50" rx="5" fill="#ffffff" stroke="#222" stroke-width="1.25"/>
  <text x="180" y="50" text-anchor="middle" font-size="13" fill="#222">Full-page jazz lead sheet</text>
  <line x1="180" y1="70" x2="180" y2="135" stroke="#222" stroke-width="1.25" marker-end="url(#arrow)"/>
  <text x="195" y="105" font-size="11" font-style="italic" fill="#444">pre-processing (rotate, resize)</text>

  <rect x="60" y="140" width="240" height="50" rx="5" fill="#EEF2F7" stroke="#222" stroke-width="1.25"/>
  <text x="180" y="170" text-anchor="middle" font-size="13" fill="#222">System detection (YOLO)</text>
  <line x1="180" y1="190" x2="180" y2="255" stroke="#222" stroke-width="1.25" marker-end="url(#arrow)"/>
  <text x="195" y="225" font-size="11" font-style="italic" fill="#444">post-processing (crop, order)</text>

  <rect x="60" y="260" width="240" height="50" rx="5" fill="#CFE2F3" stroke="#222" stroke-width="1.25"/>
  <text x="180" y="282" text-anchor="middle" font-size="13" font-weight="500" fill="#222">Staff-level inference</text>
  <text x="180" y="298" text-anchor="middle" font-size="10" fill="#333">(SMT model)</text>
  <line x1="180" y1="310" x2="180" y2="375" stroke="#222" stroke-width="1.25" marker-end="url(#arrow)"/>
  <text x="195" y="345" font-size="11" font-style="italic" fill="#444">concatenate predictions</text>

  <rect x="60" y="380" width="240" height="50" rx="5" fill="#EEF2F7" stroke="#222" stroke-width="1.25"/>
  <text x="180" y="410" text-anchor="middle" font-size="13" fill="#222">Page-level score assembly</text>
  <line x1="180" y1="430" x2="180" y2="495" stroke="#222" stroke-width="1.25" marker-end="url(#arrow)"/>
  <text x="195" y="465" font-size="11" font-style="italic" fill="#444">evaluate</text>

  <rect x="60" y="500" width="240" height="50" rx="5" fill="#ffffff" stroke="#222" stroke-width="1.25"/>
  <text x="180" y="530" text-anchor="middle" font-size="13" fill="#222">Full-page test-set metrics</text>

  <g transform="translate(60,585)" font-size="10" fill="#333">
    <rect x="0" y="0" width="14" height="10" fill="#ffffff" stroke="#222"/><text x="20" y="9">data</text>
    <rect x="70" y="0" width="14" height="10" fill="#EEF2F7" stroke="#222"/><text x="90" y="9">process</text>
    <rect x="150" y="0" width="14" height="10" fill="#CFE2F3" stroke="#222"/><text x="170" y="9">model</text>
  </g>
</svg>